<!DOCTYPE html>
<html lang="uk">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
  <title>RAMBO • STREAM OVERLAY</title>

  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&display=swap" rel="stylesheet">
  
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    html, body {
      background: transparent !important;
    }

    body {
      font-family: 'Inter', system-ui, -apple-system, sans-serif;
      display: flex;
      justify-content: center;
      align-items: center;
      padding: 20px;
    }

    /* ГОЛОВНИЙ КОНТЕЙНЕР — ПОСИЛЕНИЙ ФОН ТА ЗАХИСТ ВІД ФОНУ ГРИ */
    .widget {
      width: 480px;
      background: rgba(0, 0, 0, 0.75);
      backdrop-filter: blur(16px);
      -webkit-backdrop-filter: blur(16px);
      border-radius: 32px;
      padding: 28px 24px;
      border: 1.5px solid rgba(255, 100, 50, 0.6);
      box-shadow: 0 20px 40px rgba(0, 0, 0, 0.5), 0 0 0 1px rgba(255, 100, 50, 0.2) inset, 0 0 20px rgba(255, 80, 40, 0.3);
    }

    /* ГОЛОВНЕ ЧИСЛО — ЗБІЛЬШЕНЕ, З ПОТУЖНОЮ ТІННЮ */
    .main-number {
      text-align: center;
      margin-bottom: 24px;
    }
    .main-value {
      font-size: 96px;
      font-weight: 900;
      color: #ffffff;
      line-height: 1;
      letter-spacing: 4px;
      word-wrap: break-word;
      overflow-wrap: break-word;
      text-shadow: 0 0 30px rgba(255, 80, 40, 0.8), 0 4px 8px rgba(0, 0, 0, 0.5);
      background: linear-gradient(135deg, #ffffff, #ffeedd);
      -webkit-background-clip: text;
      background-clip: text;
      color: transparent;
      text-shadow: none;
    }
    /* Альтернативний варіант — якщо градієнт не підходить, основний білий із тінню */
    .main-value {
      color: #ffffff;
      text-shadow: 0 0 20px rgba(255, 100, 50, 0.6), 0 2px 4px rgba(0, 0, 0, 0.5);
    }
    .main-label {
      font-size: 14px;
      font-weight: 700;
      letter-spacing: 6px;
      color: #ffaa66;
      text-transform: uppercase;
      margin-top: 12px;
      text-shadow: 0 1px 2px rgba(0, 0, 0, 0.5);
    }

    /* ПРОГРЕС-БАР — ПОТОВЩЕНИЙ ТА ЯСКРАВІШИЙ */
    .progress {
      margin-bottom: 28px;
    }
    .progress-bar {
      height: 10px;
      background: rgba(255, 255, 255, 0.15);
      border-radius: 20px;
      overflow: hidden;
      box-shadow: inset 0 1px 3px rgba(0, 0, 0, 0.3);
    }
    .progress-fill {
      width: 0%;
      height: 100%;
      background: linear-gradient(90deg, #ff4d00, #ffaa33, #ffdd77);
      border-radius: 20px;
      box-shadow: 0 0 12px rgba(255, 100, 0, 0.6);
      transition: width 0.4s cubic-bezier(0.2, 0.9, 0.4, 1.2);
    }

    /* ДВІ СТАТИСТИКИ — БІЛЬШІ, КОНТРАСТНІШІ */
    .stats-row {
      display: flex;
      gap: 16px;
      margin-bottom: 28px;
    }
    .stat {
      flex: 1;
      background: rgba(0, 0, 0, 0.55);
      backdrop-filter: blur(8px);
      border-radius: 20px;
      padding: 16px 12px;
      text-align: center;
      border: 1px solid rgba(255, 100, 50, 0.3);
      transition: transform 0.1s ease;
    }
    .stat-value {
      font-size: 42px;
      font-weight: 800;
      color: #00e5ff;
      word-wrap: break-word;
      overflow-wrap: break-word;
      text-shadow: 0 0 12px rgba(0, 229, 255, 0.5);
      letter-spacing: 1px;
    }
    .stat-label {
      font-size: 11px;
      font-weight: 700;
      letter-spacing: 2.5px;
      color: #ffaa77;
      text-transform: uppercase;
      margin-top: 8px;
      text-shadow: 0 1px 2px rgba(0, 0, 0, 0.3);
    }

    /* УМОВИ — ЧИТАБЕЛЬНІ, КОМФОРТНІ, З БІЛЬШИМИ ЦИФРАМИ */
    .conditions {
      display: flex;
      flex-direction: column;
      gap: 10px;
    }
    .cond {
      display: flex;
      justify-content: space-between;
      align-items: center;
      background: rgba(0, 0, 0, 0.5);
      backdrop-filter: blur(4px);
      padding: 12px 20px;
      border-radius: 60px;
      border: 1px solid rgba(255, 100, 50, 0.25);
      transition: all 0.1s ease;
    }
    .cond-text {
      font-size: 14px;
      font-weight: 600;
      color: #ffcc99;
      letter-spacing: 0.8px;
      text-shadow: 0 1px 2px rgba(0, 0, 0, 0.3);
    }
    .cond-value {
      font-size: 20px;
      font-weight: 800;
      color: #ffaa44;
      text-shadow: 0 0 6px rgba(255, 170, 68, 0.5);
      background: rgba(0, 0, 0, 0.3);
      padding: 4px 12px;
      border-radius: 40px;
    }

    /* АНІМАЦІЇ — ПОКРАЩЕНІ, З БІЛЬШИМ ЕФЕКТОМ */
    .flash-up {
      animation: upFlash 0.25s ease-out;
    }
    .flash-down {
      animation: downFlash 0.25s ease-out;
    }
    @keyframes upFlash {
      0% { color: #00e5ff; text-shadow: 0 0 0 transparent; transform: scale(1); }
      40% { color: #88ffaa; text-shadow: 0 0 16px #00ff88; transform: scale(1.08); }
      100% { color: #00e5ff; text-shadow: 0 0 12px rgba(0, 229, 255, 0.5); transform: scale(1); }
    }
    @keyframes downFlash {
      0% { color: #00e5ff; text-shadow: 0 0 0 transparent; transform: scale(1); }
      40% { color: #ffaaaa; text-shadow: 0 0 16px #ff4444; transform: scale(0.96); }
      100% { color: #00e5ff; text-shadow: 0 0 12px rgba(0, 229, 255, 0.5); transform: scale(1); }
    }
    .main-flash-up {
      animation: mainUpFlash 0.25s ease-out;
    }
    .main-flash-down {
      animation: mainDownFlash 0.25s ease-out;
    }
    @keyframes mainUpFlash {
      0% { color: #ffffff; text-shadow: 0 0 20px rgba(255, 100, 50, 0.6); transform: scale(1); }
      40% { color: #aaffaa; text-shadow: 0 0 30px #00ff88; transform: scale(1.05); }
      100% { color: #ffffff; text-shadow: 0 0 20px rgba(255, 100, 50, 0.6); transform: scale(1); }
    }
    @keyframes mainDownFlash {
      0% { color: #ffffff; text-shadow: 0 0 20px rgba(255, 100, 50, 0.6); transform: scale(1); }
      40% { color: #ffaaaa; text-shadow: 0 0 30px #ff4444; transform: scale(0.97); }
      100% { color: #ffffff; text-shadow: 0 0 20px rgba(255, 100, 50, 0.6); transform: scale(1); }
    }

    /* АДАПТАЦІЯ ДЛЯ МАЛЕНЬКИХ РОЗМІРІВ */
    @media (max-width: 520px) {
      .widget {
        width: 400px;
        padding: 20px 16px;
      }
      .main-value {
        font-size: 72px;
      }
      .stat-value {
        font-size: 32px;
      }
      .cond-text {
        font-size: 12px;
      }
      .cond-value {
        font-size: 16px;
        padding: 3px 10px;
      }
      .main-label {
        font-size: 11px;
        letter-spacing: 4px;
      }
    }
  </style>
</head>
<body>

<div class="widget">
  
  <!-- ГОЛОВНЕ ЧИСЛО -->
  <div class="main-number">
    <div class="main-value" id="main">0</div>
    <div class="main-label">ЗАЛИШИЛОСЬ</div>
  </div>

  <!-- ПРОГРЕС -->
  <div class="progress">
    <div class="progress-bar">
      <div class="progress-fill" id="progress"></div>
    </div>
  </div>

  <!-- ДВІ СТАТИСТИКИ -->
  <div class="stats-row">
    <div class="stat">
      <div class="stat-value" id="streamer">0</div>
      <div class="stat-label">НАСТРІЛЯВ</div>
    </div>
    <div class="stat">
      <div class="stat-value" id="viewers">0</div>
      <div class="stat-label">ГЛЯДАЧІ</div>
    </div>
  </div>

  <!-- УМОВИ -->
  <div class="conditions">
    <div class="cond">
      <span class="cond-text">👍 ЛАЙК YOUTUBE</span>
      <span class="cond-value">+500</span>
    </div>
    <div class="cond">
      <span class="cond-text">📱 ТАП TIKTOK</span>
      <span class="cond-value">+1</span>
    </div>
    <div class="cond">
      <span class="cond-text">💰 1 ГРИВНЯ</span>
      <span class="cond-value">+100</span>
    </div>
  </div>
</div>

<script>
  // ========== ТЕХНІЧНА ЛОГІКА (НЕ ЗМІНЕНА) ==========
  const SHEET_ID = "17phnEn-NW-OnrZg4DcW65r-Xoq6ScsdVjS5yL0SS3fk";
  const GID = "1630188258";
  const MAX_GOAL = 300000;

  let targetRemaining = 0, targetStreamer = 0, targetViewers = 0;
  let curRemaining = 0, curStreamer = 0, curViewers = 0;

  const mainEl = document.getElementById('main');
  const progressEl = document.getElementById('progress');
  const streamerEl = document.getElementById('streamer');
  const viewersEl = document.getElementById('viewers');

  async function fetchData() {
    try {
      const url = `https://docs.google.com/spreadsheets/d/${SHEET_ID}/gviz/tq?gid=${GID}&range=C10:C14&tqx=out:json`;
      const res = await fetch(url);
      const txt = await res.text();
      const json = JSON.parse(txt.substring(txt.indexOf('{'), txt.lastIndexOf('}') + 1));
      const rows = json.table.rows || [];
      
      targetViewers = rows[0]?.c?.[0]?.v ? parseInt(rows[0].c[0].v) : 0;
      targetStreamer = rows[1]?.c?.[0]?.v ? parseInt(rows[1].c[0].v) : 0;
      targetRemaining = rows[2]?.c?.[0]?.v ? parseInt(rows[2].c[0].v) : 0;
      if (targetRemaining < 0) targetRemaining = 0;
      if (targetRemaining > MAX_GOAL) targetRemaining = MAX_GOAL;
    } catch(e) { console.error(e); }
  }

  function animateStat(el, isUp) {
    if (!el) return;
    el.classList.remove('flash-up', 'flash-down');
    void el.offsetWidth;
    el.classList.add(isUp ? 'flash-up' : 'flash-down');
    setTimeout(() => el.classList.remove('flash-up', 'flash-down'), 250);
  }

  function animateMain(isUp) {
    mainEl.classList.remove('main-flash-up', 'main-flash-down');
    void mainEl.offsetWidth;
    mainEl.classList.add(isUp ? 'main-flash-up' : 'main-flash-down');
    setTimeout(() => mainEl.classList.remove('main-flash-up', 'main-flash-down'), 250);
  }

  function updateLoop() {
    if (Math.abs(curRemaining - targetRemaining) > 0.5) {
      let step = 4;
      if (curRemaining < targetRemaining) {
        curRemaining += step;
        if (curRemaining > targetRemaining) curRemaining = targetRemaining;
        animateMain(true);
      } else {
        curRemaining -= step;
        if (curRemaining < targetRemaining) curRemaining = targetRemaining;
        animateMain(false);
      }
      mainEl.innerText = Math.floor(curRemaining).toLocaleString();
      let pct = (curRemaining / MAX_GOAL) * 100;
      progressEl.style.width = Math.min(100, Math.max(0, pct)) + "%";
    } else if (curRemaining !== targetRemaining) {
      curRemaining = targetRemaining;
      mainEl.innerText = Math.floor(curRemaining).toLocaleString();
      progressEl.style.width = ((curRemaining / MAX_GOAL) * 100) + "%";
    }
    
    if (Math.abs(curStreamer - targetStreamer) > 0.5) {
      let step = 5;
      let isUp = curStreamer < targetStreamer;
      if (isUp) { curStreamer += step; if (curStreamer > targetStreamer) curStreamer = targetStreamer; }
      else { curStreamer -= step; if (curStreamer < targetStreamer) curStreamer = targetStreamer; }
      streamerEl.innerText = Math.floor(curStreamer).toLocaleString();
      animateStat(streamerEl, isUp);
    } else if (curStreamer !== targetStreamer) {
      curStreamer = targetStreamer;
      streamerEl.innerText = Math.floor(curStreamer).toLocaleString();
    }
    
    if (Math.abs(curViewers - targetViewers) > 0.5) {
      let step = 5;
      let isUp = curViewers < targetViewers;
      if (isUp) { curViewers += step; if (curViewers > targetViewers) curViewers = targetViewers; }
      else { curViewers -= step; if (curViewers < targetViewers) curViewers = targetViewers; }
      viewersEl.innerText = Math.floor(curViewers).toLocaleString();
      animateStat(viewersEl, isUp);
    } else if (curViewers !== targetViewers) {
      curViewers = targetViewers;
      viewersEl.innerText = Math.floor(curViewers).toLocaleString();
    }
    
    requestAnimationFrame(updateLoop);
  }

  async function init() {
    await fetchData();
    curRemaining = targetRemaining;
    curStreamer = targetStreamer;
    curViewers = targetViewers;
    mainEl.innerText = Math.floor(curRemaining).toLocaleString();
    progressEl.style.width = ((curRemaining / MAX_GOAL) * 100) + "%";
    streamerEl.innerText = Math.floor(curStreamer).toLocaleString();
    viewersEl.innerText = Math.floor(curViewers).toLocaleString();
    
    setInterval(async () => { await fetchData(); }, 5000);
    requestAnimationFrame(updateLoop);
  }
  
  init();
</script>
</body>
</html>
