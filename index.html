<!DOCTYPE html>
<html lang="uk">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
  <title>RAMBO • STREAM OVERLAY + TIMER</title>

  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&family=Orbitron:wght@700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/flipclock/0.7.8/flipclock.css" />

  <style>
    :root {
      --brand: #ff8c00;
      --txt: #fff;
      --shadow: rgba(0,0,0,.65);
      --stat-streamer: #bcbcbc;
      --stat-viewers: #ff6900;
      --orange-soft: #ffb26b;
      --timer-dots: #bcbcbc;
      --panel-bg: rgba(0, 0, 0, 0.50);
    }

    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    html, body {
      background: transparent !important;
    }

    body {
      font-family: 'Inter', system-ui, -apple-system, sans-serif;
      display: flex;
      justify-content: center;
      align-items: center;
      padding: 20px;
      color: var(--txt);
    }

    .container {
      display: flex;
      flex-direction: column;
      gap: 18px;
      align-items: center;
    }

    .widget {
      width: 560px;
      background: var(--panel-bg);
      backdrop-filter: blur(16px);
      -webkit-backdrop-filter: blur(16px);
      border-radius: 28px;
      padding: 20px 20px 18px;
      border: 1px solid rgba(255,255,255,.09);
      box-shadow: 0 20px 40px rgba(0,0,0,.42);
    }

    .main-number {
      text-align: center;
      margin-bottom: 18px;
    }

    .main-label {
      font-family: 'Orbitron', sans-serif;
      font-size: 42px;
      font-weight: 700;
      color: var(--brand);
      text-transform: uppercase;
      line-height: 1.05;
      margin-bottom: 8px;
    }

    .main-flip-wrap {
      display: flex;
      justify-content: center;
      align-items: center;
      min-height: 127px;
    }

    .main-flip-board {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      gap: 6px;
      background: rgba(0,0,0,.55);
      border: 2px solid var(--brand);
      border-radius: 12px;
      padding: 7px;
      overflow: hidden;
    }

    .flip-digit {
      position: relative;
      width: 72px;
      height: 101px;
      perspective: 432px;
      border-radius: 8px;
      background: #111;
      box-shadow: 0 3px 7px rgba(0,0,0,.6);
      overflow: hidden;
      font-family: Arial, Helvetica, sans-serif;
      font-weight: 700;
      color: #ddd;
      text-shadow: none;
    }

    .flip-digit::after {
      content: "";
      position: absolute;
      left: 0;
      right: 0;
      top: 50%;
      height: 1px;
      background: rgba(0,0,0,.72);
      z-index: 20;
    }

    .digit-half {
      position: absolute;
      left: 0;
      width: 100%;
      height: 50%;
      overflow: hidden;
      background: #333;
      backface-visibility: hidden;
      transform-style: preserve-3d;
    }

    .digit-half.top {
      top: 0;
      border-radius: 8px 8px 0 0;
      background: linear-gradient(to bottom, #4b4b4b 0%, #303030 100%);
    }

    .digit-half.bottom {
      bottom: 0;
      border-radius: 0 0 8px 8px;
      background: linear-gradient(to bottom, #252525 0%, #1b1b1b 100%);
    }

    .digit-num {
      position: absolute;
      left: 0;
      width: 100%;
      height: 101px;
      line-height: 101px;
      text-align: center;
      font-size: 95px;
      font-weight: 700;
      text-shadow: none;
    }

    .digit-half.top .digit-num {
      top: 0;
    }

    .digit-half.bottom .digit-num {
      bottom: 0;
    }

    .flip-top {
      z-index: 10;
      transform-origin: bottom;
    }

    .flip-bottom {
      z-index: 9;
      transform-origin: top;
      transform: rotateX(90deg);
    }

    .flip-digit.play .flip-top {
      animation: flipTop 0.12s linear forwards;
    }

    .flip-digit.play .flip-bottom {
      animation: flipBottom 0.12s linear 0.10s forwards;
    }

    @keyframes flipTop {
      0% { transform: rotateX(0deg); }
      100% { transform: rotateX(-90deg); }
    }

    @keyframes flipBottom {
      0% { transform: rotateX(90deg); }
      100% { transform: rotateX(0deg); }
    }

    .stats-row {
      display: flex;
      gap: 14px;
      margin-bottom: 18px;
    }

    .stat {
      flex: 1;
      background: rgba(0, 0, 0, 0.92);
      border-radius: 15px;
      padding: 16px 10px 12px;
      text-align: center;
      border: 1px solid rgba(255,255,255,.04);
    }

    .stat-value {
      font-size: 50px;
      font-weight: 900;
      letter-spacing: 1px;
      line-height: 1;
      text-shadow: none;
    }

    #streamer {
      color: var(--stat-streamer);
      text-shadow: none;
    }

    #viewers {
      color: var(--stat-viewers);
      text-shadow: none;
    }

    .stat-label {
      font-size: 16px;
      font-weight: 800;
      letter-spacing: 1.5px;
      color: var(--orange-soft);
      text-transform: uppercase;
      margin-top: 9px;
    }

    .conditions {
      display: flex;
      flex-direction: column;
      gap: 11px;
    }

    .cond {
      display: flex;
      justify-content: space-between;
      align-items: center;
      background: rgba(0, 0, 0, 0.94);
      padding: 13px 18px;
      border-radius: 999px;
      border: 1px solid rgba(255,255,255,.04);
    }

    .cond-text {
      font-size: 25px;
      font-weight: 800;
      color: #f3f6f4;
      letter-spacing: 0.3px;
    }

    .cond-value {
      font-size: 35px;
      font-weight: 900;
      color: #FF7819;
      text-shadow: none;
    }

    .timer-block {
      width: 560px;
      background: var(--panel-bg);
      backdrop-filter: blur(16px);
      -webkit-backdrop-filter: blur(16px);
      border-radius: 28px;
      padding: 18px 20px 20px;
      border: 1px solid rgba(255,255,255,.09);
      box-shadow: 0 20px 40px rgba(0,0,0,.42);
      text-align: center;
    }

    .timer-label {
      font-size: 25px;
      font-weight: 800;
      letter-spacing: 3px;
      color: #f2ddd0;
      text-transform: uppercase;
      margin-bottom: 14px;
    }

    .timer-flip {
      display: flex;
      justify-content: center;
      align-items: center;
    }

    .timer-block.expired .timer-flip {
      display: none;
    }

    .timer-expired {
      display: none;
      justify-content: center;
      align-items: center;
      min-height: 94px;
      background: rgba(0,0,0,.15);
      border: 2px solid var(--brand);
      border-radius: 12px;
      padding: 18px 20px;
      font-family: 'Orbitron', sans-serif;
      font-size: 46px;
      font-weight: 700;
      color: var(--brand);
      text-transform: uppercase;
      letter-spacing: 2px;
      line-height: 1;
    }

    .timer-block.expired .timer-expired {
      display: flex;
    }

    /* ========== ТАЙМЕР У ВИГЛЯДІ ЗІ СТАРОГО КОДУ ========== */

    .timer-flip .flip-clock-wrapper {
      background: rgba(0,0,0,.15);
      border: 2px solid var(--brand);
      border-radius: 8px;
      display: inline-block;
      width: fit-content;
      margin: 0 auto;
      padding: 7px 8px 0;
    }

    .timer-flip .flip-clock-wrapper ul {
      position: relative;
      width: 52px;
      height: 74px;
      margin: 3px;
      border-radius: 8px;
      background: #111;
      box-shadow: 0 3px 7px rgba(0,0,0,.6);
    }

    .timer-flip .flip-clock-wrapper ul::after {
      content: "";
      position: absolute;
      left: 0;
      right: 0;
      top: 50%;
      height: 2px;
      background: rgba(0, 0, 0, 0.82);
      z-index: 20;
      transform: translateY(-1px);
      pointer-events: none;
    }

    .timer-flip .flip-clock-wrapper ul::before {
      content: "";
      position: absolute;
      left: 0;
      right: 0;
      top: calc(50% - 1px);
      height: 1px;
      background: rgba(255,255,255,0.08);
      z-index: 21;
      pointer-events: none;
    }

    .timer-flip .flip-clock-wrapper ul li {
      line-height: 74px;
    }

    .timer-flip .flip-clock-wrapper ul li a div {
      font-size: 74px;
    }

    .timer-flip .flip-clock-wrapper ul li a div div.inn {
      font-family: Arial, Helvetica, sans-serif;
      font-size: 74px;
      font-weight: 700;
      color: #ddd;
      background-color: #333;
      text-shadow: none;
    }

    .timer-flip .flip-clock-divider {
      width: 18px;
      height: 84px;
    }

    .timer-flip .flip-clock-dot {
      width: 8px;
      height: 8px;
      left: 5px;
      background: var(--timer-dots);
      box-shadow: none;
    }

    .timer-flip .flip-clock-divider .flip-clock-label {
      display: none;
    }

    .flash-up {
      animation: upFlash 0.25s ease-out;
    }

    .flash-down {
      animation: downFlash 0.25s ease-out;
    }

    @keyframes upFlash {
      0% { transform: scale(1); filter: brightness(1); }
      40% { transform: scale(1.06); filter: brightness(1.4); }
      100% { transform: scale(1); filter: brightness(1); }
    }

    @keyframes downFlash {
      0% { transform: scale(1); filter: brightness(1); }
      40% { transform: scale(0.97); filter: brightness(1.35); }
      100% { transform: scale(1); filter: brightness(1); }
    }
  </style>
</head>

<body>

<div class="container">

  <div class="widget">

    <div class="main-number">
      <div class="main-label">ЗАЛИШИЛОСЬ</div>

      <div class="main-flip-wrap">
        <div class="main-flip-board" id="mainBoard"></div>
      </div>
    </div>

    <div class="stats-row">
      <div class="stat">
        <div class="stat-value" id="streamer">0</div>
        <div class="stat-label">ВЖЕ НАСТРІЛЯВ</div>
      </div>

      <div class="stat">
        <div class="stat-value" id="viewers">0</div>
        <div class="stat-label">ДОДАЛИ ГЛЯДАЧІ</div>
      </div>
    </div>

    <div class="conditions">
      <div class="cond">
        <span class="cond-text">👍 1 ЛАЙК YOUTUBE</span>
        <span class="cond-value">+250</span>
      </div>

      <div class="cond">
        <span class="cond-text">📱 4 ТАПИ TIKTOK</span>
        <span class="cond-value">+1</span>
      </div>

      <div class="cond">
        <span class="cond-text">💰 1 ГРИВНЯ</span>
        <span class="cond-value">+50</span>
      </div>
    </div>

  </div>

  <div class="timer-block" id="timerBlock">
    <div class="timer-label">⏱️ ДО КІНЦЯ ЧЕЛЕНДЖУ</div>

    <div class="timer-flip">
      <div id="flip-clock"></div>
    </div>

    <div class="timer-expired" id="timerExpired">ЧАС ВИЙШОВ</div>
  </div>

</div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/jquery/3.6.0/jquery.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/flipclock/0.7.8/flipclock.min.js"></script>

<script>
  const SHEET_ID = "17phnEn-NW-OnrZg4DcW65r-Xoq6ScsdVjS5yL0SS3fk";
  const GID = "1630188258";
  const MAX_GOAL = 999000;

  const MAIN_TICK_MS = 20;

  let targetRemaining = 0;
  let targetStreamer = 0;
  let targetViewers = 0;

  let currentDamage = 0;
  let curStreamer = 0;
  let curViewers = 0;

  let currentBoardString = "";
  let boardDigits = [];
  let damageInterval = null;
  let inProgress = false;

  let flipTimerClock = null;
  let timerIsExpired = false;
  let timerCheckInterval = null;

  const mainBoard = document.getElementById('mainBoard');
  const streamerEl = document.getElementById('streamer');
  const viewersEl = document.getElementById('viewers');
  const timerBlockEl = document.getElementById('timerBlock');

  async function fetchData() {
    try {
      const url = `https://docs.google.com/spreadsheets/d/${SHEET_ID}/gviz/tq?gid=${GID}&range=C10:C14&tqx=out:json`;
      const res = await fetch(url);
      const txt = await res.text();

      const json = JSON.parse(
        txt.substring(txt.indexOf('{'), txt.lastIndexOf('}') + 1)
      );

      const rows = json.table.rows || [];

      targetViewers = rows[0]?.c?.[0]?.v ? parseInt(String(rows[0].c[0].v).replace(/\s/g, ''), 10) : 0;
      targetStreamer = rows[1]?.c?.[0]?.v ? parseInt(String(rows[1].c[0].v).replace(/\s/g, ''), 10) : 0;
      targetRemaining = rows[2]?.c?.[0]?.v ? parseInt(String(rows[2].c[0].v).replace(/\s/g, ''), 10) : 0;

      if (isNaN(targetViewers)) targetViewers = 0;
      if (isNaN(targetStreamer)) targetStreamer = 0;
      if (isNaN(targetRemaining)) targetRemaining = 0;

      if (targetRemaining < 0) targetRemaining = 0;
      if (targetRemaining > MAX_GOAL) targetRemaining = MAX_GOAL;

    } catch (e) {
      console.error('Помилка отримання даних:', e);
    }
  }

  function makeDigitHTML(value) {
    return `
      <div class="digit-half top static-top">
        <div class="digit-num">${value}</div>
      </div>

      <div class="digit-half bottom static-bottom">
        <div class="digit-num">${value}</div>
      </div>

      <div class="digit-half top flip-top">
        <div class="digit-num">${value}</div>
      </div>

      <div class="digit-half bottom flip-bottom">
        <div class="digit-num">${value}</div>
      </div>
    `;
  }

  function setDigitText(digitEl, selector, value) {
    const node = digitEl.querySelector(selector);
    if (node) node.textContent = value;
  }

  function flipDigit(digitEl, oldValue, newValue) {
    digitEl.classList.remove("play");
    void digitEl.offsetWidth;

    setDigitText(digitEl, ".static-top .digit-num", oldValue);
    setDigitText(digitEl, ".static-bottom .digit-num", oldValue);
    setDigitText(digitEl, ".flip-top .digit-num", oldValue);
    setDigitText(digitEl, ".flip-bottom .digit-num", newValue);

    digitEl.classList.add("play");

    clearTimeout(digitEl._flipTimer);
    digitEl._flipTimer = setTimeout(() => {
      setDigitText(digitEl, ".static-top .digit-num", newValue);
      setDigitText(digitEl, ".static-bottom .digit-num", newValue);
      setDigitText(digitEl, ".flip-top .digit-num", newValue);
      setDigitText(digitEl, ".flip-bottom .digit-num", newValue);
      digitEl.dataset.value = newValue;
      digitEl.classList.remove("play");
    }, 240);
  }

  function buildMainBoard(value) {
    const str = String(Math.max(0, Math.floor(value)));
    mainBoard.innerHTML = "";
    boardDigits = [];

    for (const ch of str) {
      const el = document.createElement("div");
      el.className = "flip-digit";
      el.dataset.value = ch;
      el.innerHTML = makeDigitHTML(ch);
      mainBoard.appendChild(el);
      boardDigits.push(el);
    }

    currentBoardString = str;
  }

  function updateMainBoard(value, animate = true) {
    const nextStr = String(Math.max(0, Math.floor(value)));

    if (!currentBoardString || nextStr.length !== currentBoardString.length) {
      buildMainBoard(value);
      return;
    }

    for (let i = 0; i < nextStr.length; i++) {
      const oldValue = currentBoardString[i];
      const newValue = nextStr[i];

      if (oldValue === newValue) continue;

      const digitEl = boardDigits[i];

      if (animate) {
        flipDigit(digitEl, oldValue, newValue);
      } else {
        setDigitText(digitEl, ".static-top .digit-num", newValue);
        setDigitText(digitEl, ".static-bottom .digit-num", newValue);
        setDigitText(digitEl, ".flip-top .digit-num", newValue);
        setDigitText(digitEl, ".flip-bottom .digit-num", newValue);
        digitEl.dataset.value = newValue;
      }
    }

    currentBoardString = nextStr;
  }

  function animateDamage(newValue) {
    if (inProgress) {
      clearInterval(damageInterval);
      inProgress = false;
    }

    if (currentDamage === newValue) return;

    const direction = newValue > currentDamage ? 1 : -1;
    inProgress = true;

    damageInterval = setInterval(() => {
      if (currentDamage === newValue) {
        clearInterval(damageInterval);
        inProgress = false;
        return;
      }

      currentDamage += direction;

      if (direction > 0 && currentDamage > newValue) currentDamage = newValue;
      if (direction < 0 && currentDamage < newValue) currentDamage = newValue;

      updateMainBoard(currentDamage, true);

      if (currentDamage === newValue) {
        clearInterval(damageInterval);
        inProgress = false;
      }
    }, MAIN_TICK_MS);
  }

  function animateStat(el, isUp) {
    if (!el) return;

    el.classList.remove('flash-up', 'flash-down');
    void el.offsetWidth;
    el.classList.add(isUp ? 'flash-up' : 'flash-down');

    setTimeout(() => {
      el.classList.remove('flash-up', 'flash-down');
    }, 250);
  }

  function updateStatsLoop() {
    if (Math.abs(curStreamer - targetStreamer) > 0.5) {
      const step = 5;
      const isUp = curStreamer < targetStreamer;

      if (isUp) {
        curStreamer += step;
        if (curStreamer > targetStreamer) curStreamer = targetStreamer;
      } else {
        curStreamer -= step;
        if (curStreamer < targetStreamer) curStreamer = targetStreamer;
      }

      streamerEl.innerText = Math.floor(curStreamer).toLocaleString();
      animateStat(streamerEl, isUp);

    } else if (curStreamer !== targetStreamer) {
      curStreamer = targetStreamer;
      streamerEl.innerText = Math.floor(curStreamer).toLocaleString();
    }

    if (Math.abs(curViewers - targetViewers) > 0.5) {
      const step = 5;
      const isUp = curViewers < targetViewers;

      if (isUp) {
        curViewers += step;
        if (curViewers > targetViewers) curViewers = targetViewers;
      } else {
        curViewers -= step;
        if (curViewers < targetViewers) curViewers = targetViewers;
      }

      viewersEl.innerText = Math.floor(curViewers).toLocaleString();
      animateStat(viewersEl, isUp);

    } else if (curViewers !== targetViewers) {
      curViewers = targetViewers;
      viewersEl.innerText = Math.floor(curViewers).toLocaleString();
    }

    requestAnimationFrame(updateStatsLoop);
  }

  function getTimeLeftKyiv() {
    const now = new Date();
    const kyiv = new Date(now.toLocaleString('en-US', { timeZone: 'Europe/Kyiv' }));
    const end = new Date(kyiv);
    end.setHours(23, 59, 59, 999);

    let seconds = Math.floor((end - kyiv) / 1000);
    if (seconds < 0) seconds = 0;

    return seconds;
  }

  function setTimerExpired() {
    if (timerIsExpired) return;

    timerIsExpired = true;

    if (timerCheckInterval) {
      clearInterval(timerCheckInterval);
      timerCheckInterval = null;
    }

    if (flipTimerClock && typeof flipTimerClock.stop === 'function') {
      flipTimerClock.stop();
    }

    if (timerBlockEl) {
      timerBlockEl.classList.add('expired');
    }
  }

  function initFlipTimer() {
    const startSeconds = getTimeLeftKyiv();

    if (startSeconds <= 0) {
      setTimerExpired();
      return;
    }

    flipTimerClock = $('#flip-clock').FlipClock(startSeconds, {
      clockFace: 'HourlyCounter',
      countdown: true,
      autoStart: true
    });

    timerCheckInterval = setInterval(() => {
      const left = getTimeLeftKyiv();

      if (left <= 0) {
        setTimerExpired();
        return;
      }

      if (flipTimerClock) {
        flipTimerClock.setTime(left);
      }
    }, 60000);
  }

  async function init() {
    await fetchData();

    currentDamage = targetRemaining;
    curStreamer = targetStreamer;
    curViewers = targetViewers;

    buildMainBoard(currentDamage);

    streamerEl.innerText = Math.floor(curStreamer).toLocaleString();
    viewersEl.innerText = Math.floor(curViewers).toLocaleString();

    setInterval(async () => {
      await fetchData();
      animateDamage(targetRemaining);
    }, 5000);

    requestAnimationFrame(updateStatsLoop);

    initFlipTimer();
  }

  init();
</script>

</body>
</html>
