<!DOCTYPE html>
<html lang="uk">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
  <title>RAMBO • MINI</title>

  <link href="https://fonts.googleapis.com/css2?family=Space+Mono:wght@400;700&display=swap" rel="stylesheet">
  
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    html, body {
      background: transparent !important;
    }

    body {
      font-family: 'Space Mono', monospace;
      display: flex;
      justify-content: center;
      align-items: center;
      padding: 20px;
    }

    .widget {
      width: 420px;
      background: rgba(0, 0, 0, 0.55);
      backdrop-filter: blur(10px);
      border-radius: 24px;
      padding: 24px 20px;
      border: 1px solid rgba(255, 80, 40, 0.4);
    }

    .main-number {
      text-align: center;
      margin-bottom: 20px;
    }
    .main-value {
      font-size: 72px;
      font-weight: 700;
      color: #ffffff;
      line-height: 1.1;
      letter-spacing: 2px;
      word-wrap: break-word;
      overflow-wrap: break-word;
    }
    .main-label {
      font-size: 11px;
      letter-spacing: 4px;
      color: #ff884d;
      text-transform: uppercase;
      margin-top: 6px;
    }

    .stats-row {
      display: flex;
      gap: 12px;
      margin-bottom: 20px;
    }
    .stat {
      flex: 1;
      background: rgba(0,0,0,0.4);
      border-radius: 16px;
      padding: 12px;
      text-align: center;
    }
    .stat-value {
      font-size: 28px;
      font-weight: 700;
      color: #00e5ff;
      word-wrap: break-word;
      overflow-wrap: break-word;
    }
    .stat-label {
      font-size: 9px;
      letter-spacing: 1.5px;
      color: #aaa;
      text-transform: uppercase;
      margin-top: 5px;
    }

    .progress {
      margin-bottom: 20px;
    }
    .progress-bar {
      height: 5px;
      background: rgba(255,255,255,0.15);
      border-radius: 10px;
      overflow: hidden;
    }
    .progress-fill {
      width: 0%;
      height: 100%;
      background: linear-gradient(90deg, #ff4d00, #ffaa33);
      border-radius: 10px;
    }

    .conditions {
      display: flex;
      flex-direction: column;
      gap: 8px;
    }
    .cond {
      display: flex;
      justify-content: space-between;
      align-items: center;
      background: rgba(0,0,0,0.3);
      padding: 10px 16px;
      border-radius: 40px;
    }
    .cond-text {
      font-size: 12px;
      font-weight: 600;
      color: #ffaa77;
      letter-spacing: 0.5px;
    }
    .cond-value {
      font-size: 16px;
      font-weight: 700;
      color: #ffffff;
    }

    .flash-up {
      animation: up 0.2s ease-out;
    }
    .flash-down {
      animation: down 0.2s ease-out;
    }
    @keyframes up {
      0% { color: #00e5ff; }
      50% { color: #88ff88; text-shadow: 0 0 6px #00ff88; }
      100% { color: #00e5ff; }
    }
    @keyframes down {
      0% { color: #00e5ff; }
      50% { color: #ff8888; text-shadow: 0 0 6px #ff4444; }
      100% { color: #00e5ff; }
    }
    .main-flash-up {
      animation: mainUp 0.2s ease-out;
    }
    .main-flash-down {
      animation: mainDown 0.2s ease-out;
    }
    @keyframes mainUp {
      0% { color: white; }
      50% { color: #aaffaa; text-shadow: 0 0 10px #00ff88; }
      100% { color: white; }
    }
    @keyframes mainDown {
      0% { color: white; }
      50% { color: #ffaaaa; text-shadow: 0 0 10px #ff4444; }
      100% { color: white; }
    }
  </style>
</head>
<body>

<div class="widget">
  
  <div class="main-number">
    <div class="main-value" id="main">0</div>
    <div class="main-label">ЗАЛИШИЛОСЬ</div>
  </div>

  <div class="progress">
    <div class="progress-bar">
      <div class="progress-fill" id="progress"></div>
    </div>
  </div>

  <div class="stats-row">
    <div class="stat">
      <div class="stat-value" id="streamer">0</div>
      <div class="stat-label">НАСТРІЛЯВ</div>
    </div>
    <div class="stat">
      <div class="stat-value" id="viewers">0</div>
      <div class="stat-label">ГЛЯДАЧІ</div>
    </div>
  </div>

  <div class="conditions">
    <div class="cond">
      <span class="cond-text">👍 ЛАЙК YOUTUBE</span>
      <span class="cond-value">+500</span>
    </div>
    <div class="cond">
      <span class="cond-text">📱 ТАП TIKTOK</span>
      <span class="cond-value">+1</span>
    </div>
    <div class="cond">
      <span class="cond-text">💰 1 ГРИВНЯ</span>
      <span class="cond-value">+100</span>
    </div>
  </div>
</div>

<script>
  const SHEET_ID = "17phnEn-NW-OnrZg4DcW65r-Xoq6ScsdVjS5yL0SS3fk";
  const GID = "1630188258";
  const MAX_GOAL = 300000;

  let targetRemaining = 0, targetStreamer = 0, targetViewers = 0;
  let curRemaining = 0, curStreamer = 0, curViewers = 0;

  const mainEl = document.getElementById('main');
  const progressEl = document.getElementById('progress');
  const streamerEl = document.getElementById('streamer');
  const viewersEl = document.getElementById('viewers');

  async function fetchData() {
    try {
      const url = `https://docs.google.com/spreadsheets/d/${SHEET_ID}/gviz/tq?gid=${GID}&range=C10:C14&tqx=out:json`;
      const res = await fetch(url);
      const txt = await res.text();
      const json = JSON.parse(txt.substring(txt.indexOf('{'), txt.lastIndexOf('}') + 1));
      const rows = json.table.rows || [];
      
      targetViewers = rows[0]?.c?.[0]?.v ? parseInt(rows[0].c[0].v) : 0;
      targetStreamer = rows[1]?.c?.[0]?.v ? parseInt(rows[1].c[0].v) : 0;
      targetRemaining = rows[2]?.c?.[0]?.v ? parseInt(rows[2].c[0].v) : 0;
      if (targetRemaining < 0) targetRemaining = 0;
      if (targetRemaining > MAX_GOAL) targetRemaining = MAX_GOAL;
    } catch(e) { console.error(e); }
  }

  function animateStat(el, isUp) {
    if (!el) return;
    el.classList.remove('flash-up', 'flash-down');
    void el.offsetWidth;
    el.classList.add(isUp ? 'flash-up' : 'flash-down');
    setTimeout(() => el.classList.remove('flash-up', 'flash-down'), 200);
  }

  function animateMain(isUp) {
    mainEl.classList.remove('main-flash-up', 'main-flash-down');
    void mainEl.offsetWidth;
    mainEl.classList.add(isUp ? 'main-flash-up' : 'main-flash-down');
    setTimeout(() => mainEl.classList.remove('main-flash-up', 'main-flash-down'), 200);
  }

  function updateLoop() {
    if (Math.abs(curRemaining - targetRemaining) > 0.5) {
      let step = 4;
      if (curRemaining < targetRemaining) {
        curRemaining += step;
        if (curRemaining > targetRemaining) curRemaining = targetRemaining;
        animateMain(true);
      } else {
        curRemaining -= step;
        if (curRemaining < targetRemaining) curRemaining = targetRemaining;
        animateMain(false);
      }
      mainEl.innerText = Math.floor(curRemaining).toLocaleString();
      let pct = (curRemaining / MAX_GOAL) * 100;
      progressEl.style.width = Math.min(100, Math.max(0, pct)) + "%";
    } else if (curRemaining !== targetRemaining) {
      curRemaining = targetRemaining;
      mainEl.innerText = Math.floor(curRemaining).toLocaleString();
      progressEl.style.width = ((curRemaining / MAX_GOAL) * 100) + "%";
    }
    
    if (Math.abs(curStreamer - targetStreamer) > 0.5) {
      let step = 5;
      let isUp = curStreamer < targetStreamer;
      if (isUp) { curStreamer += step; if (curStreamer > targetStreamer) curStreamer = targetStreamer; }
      else { curStreamer -= step; if (curStreamer < targetStreamer) curStreamer = targetStreamer; }
      streamerEl.innerText = Math.floor(curStreamer).toLocaleString();
      animateStat(streamerEl, isUp);
    } else if (curStreamer !== targetStreamer) {
      curStreamer = targetStreamer;
      streamerEl.innerText = Math.floor(curStreamer).toLocaleString();
    }
    
    if (Math.abs(curViewers - targetViewers) > 0.5) {
      let step = 5;
      let isUp = curViewers < targetViewers;
      if (isUp) { curViewers += step; if (curViewers > targetViewers) curViewers = targetViewers; }
      else { curViewers -= step; if (curViewers < targetViewers) curViewers = targetViewers; }
      viewersEl.innerText = Math.floor(curViewers).toLocaleString();
      animateStat(viewersEl, isUp);
    } else if (curViewers !== targetViewers) {
      curViewers = targetViewers;
      viewersEl.innerText = Math.floor(curViewers).toLocaleString();
    }
    
    requestAnimationFrame(updateLoop);
  }

  async function init() {
    await fetchData();
    curRemaining = targetRemaining;
    curStreamer = targetStreamer;
    curViewers = targetViewers;
    mainEl.innerText = Math.floor(curRemaining).toLocaleString();
    progressEl.style.width = ((curRemaining / MAX_GOAL) * 100) + "%";
    streamerEl.innerText = Math.floor(curStreamer).toLocaleString();
    viewersEl.innerText = Math.floor(curViewers).toLocaleString();
    
    setInterval(async () => { await fetchData(); }, 5000);
    requestAnimationFrame(updateLoop);
  }
  
  init();
</script>
</body>
</html>
