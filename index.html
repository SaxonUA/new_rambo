<!DOCTYPE html>
<html lang="uk">
<head>
  <meta charset="UTF-8" />
  <title>RAMBO WIDGET PRO</title>
  <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@700;900&family=Rajdhani:wght@600&display=swap" rel="stylesheet">
  
  <style>
    :root {
      --primary: #ff4d00;
      --secondary: #ffae00;
      --bg-dark: rgba(0, 0, 0, 0.85); 
    }

    body {
      margin: 0;
      padding: 20px;
      background: transparent;
      font-family: 'Rajdhani', sans-serif;
      color: white;
      display: flex;
      justify-content: center;
    }

    .widget-container {
      width: 600px;
      background: var(--bg-dark);
      border: 1px solid rgba(255, 77, 0, 0.3);
      border-top: 4px solid var(--primary);
      border-radius: 0 50px 0 50px; 
      padding: 25px;
      position: relative;
      backdrop-filter: blur(10px);
      box-shadow: 0 25px 50px rgba(0,0,0,0.9);
      text-align: center;
    }

    .header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 20px;
      border-bottom: 1px solid rgba(255, 255, 255, 0.1);
      padding-bottom: 10px;
    }

    .title {
      font-family: 'Orbitron', sans-serif;
      font-weight: 900;
      font-size: 22px;
      color: var(--primary);
      letter-spacing: 2px;
    }

    .timer-box {
      font-family: 'Orbitron', sans-serif;
      font-size: 22px;
      color: #00ffcc;
    }

    .damage-label {
      font-size: 18px;
      color: #ffffff;
      letter-spacing: 4px;
      text-transform: uppercase;
    }

    .damage-value {
      font-family: 'Orbitron', sans-serif;
      font-size: 110px; 
      font-weight: 900;
      line-height: 1.1;
      margin: 5px 0;
      color: #fff;
      text-shadow: 0 0 40px rgba(255, 77, 0, 0.3);
      transition: color 0.3s ease;
    }

    .progress-bar-container {
      height: 14px;
      background: rgba(255, 255, 255, 0.05);
      border-radius: 7px;
      margin: 15px auto 25px auto;
      width: 90%;
      border: 1px solid rgba(255, 255, 255, 0.1);
      overflow: hidden;
    }

    .progress-fill {
      height: 100%;
      width: 0%; 
      background: linear-gradient(90deg, #ff0000, var(--primary), var(--secondary));
      box-shadow: 0 0 15px var(--primary);
      /* Плавність прогрес-бару тепер відповідає швидкості цифр */
      transition: width 0.5s linear;
    }

    .conditions-list {
      display: flex;
      flex-direction: column;
      border: 1px solid rgba(255, 77, 0, 0.2);
      border-radius: 0 25px 0 25px; 
      background: rgba(0, 0, 0, 0.6);
      width: 95%;
      margin: 0 auto;
      overflow: hidden;
    }

    .condition-row {
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 10px 20px;
      border-bottom: 1px solid rgba(255, 77, 0, 0.1);
    }

    .condition-row:last-child { border-bottom: none; }

    .cond-text {
      font-family: 'Orbitron', sans-serif;
      font-size: 15px; 
      font-weight: 700;
      color: #ccc;
      text-transform: uppercase;
      letter-spacing: 1px;
    }

    .cond-reward {
      font-family: 'Orbitron', sans-serif;
      font-size: 18px; 
      color: var(--secondary);
      font-weight: 900;
    }

    .val-up { color: #00ff88 !important; text-shadow: 0 0 60px rgba(0, 255, 136, 0.8); }
    .val-down { color: #ff3333 !important; text-shadow: 0 0 60px rgba(255, 51, 51, 0.8); }
  </style>
</head>
<body>

  <div class="widget-container">
    <div class="header">
      <div class="title">RAMBO</div>
      <div id="timer" class="timer-box">00:00:00</div>
    </div>

    <div class="damage-label">ЗАЛИШИЛОСЬ НАСТРІЛЯТИ</div>
    <div id="damage-display" class="damage-value">0</div>

    <div class="progress-bar-container">
      <div id="progress-fill" class="progress-fill"></div>
    </div>

    <div class="conditions-list">
      <div class="condition-row">
        <span class="cond-text">1 ЛАЙК YOUTUBE</span>
        <span class="cond-reward">+250 HP</span>
      </div>
      <div class="condition-row">
        <span class="cond-text">4 ТАПИ TIKTOK</span>
        <span class="cond-reward">+1 HP</span>
      </div>
      <div class="condition-row">
        <span class="cond-text">1 ГРИВНЯ DONAT</span>
        <span class="cond-reward">+50 HP</span>
      </div>
    </div>
  </div>

  <script>
    const SHEET_ID = "17phnEn-NW-OnrZg4DcW65r-Xoq6ScsdVjS5yL0SS3fk";
    const GID = "1630188258";
    const MAX_GOAL = 50000; 

    let currentVal = 0;
    let targetVal = 0;

    async function fetchData() {
      try {
        const url = `https://docs.google.com/spreadsheets/d/${SHEET_ID}/gviz/tq?gid=${GID}&range=C14&tqx=out:json`;
        const res = await fetch(url);
        const txt = await res.text();
        const json = JSON.parse(txt.substring(txt.indexOf('{'), txt.lastIndexOf('}') + 1));
        targetVal = parseInt(json.table.rows[0].c[0]?.v || 0);
      } catch (e) { console.error("Data error", e); }
    }

    // ЛОГІКА НАДПОВІЛЬНОГО ЛІЧИЛЬНИКА
    function smoothCounter() {
      const display = document.getElementById('damage-display');
      const progress = document.getElementById('progress-fill');
      
      if (Math.abs(currentVal - targetVal) > 0.1) {
        // Швидкість: 10000 одиниць за 60 секунд (при 60 FPS крок = ~2.7)
        // Налаштуйте число 2.8 нижче, щоб змінити швидкість (менше = повільніше)
        const step = 2.8; 

        if (currentVal < targetVal) {
          currentVal += step;
          if (currentVal > targetVal) currentVal = targetVal;
          display.className = 'damage-value val-up';
        } else {
          currentVal -= step;
          if (currentVal < targetVal) currentVal = targetVal;
          display.className = 'damage-value val-down';
        }

        display.innerText = Math.floor(currentVal).toLocaleString();
        
        let percent = (currentVal / MAX_GOAL) * 100;
        progress.style.width = Math.min(100, Math.max(0, percent)) + "%";
      } else {
        display.className = 'damage-value';
      }
      
      requestAnimationFrame(smoothCounter);
    }

    function updateTimer() {
      const now = new Date();
      const kyiv = new Date(now.toLocaleString('en-US', { timeZone: 'Europe/Kyiv' }));
      const end = new Date(kyiv); 
      end.setHours(23,59,59,999);
      let diff = end - kyiv;
      if (diff < 0) diff = 0;
      let h = Math.floor(diff / 3600000).toString().padStart(2, '0');
      let m = Math.floor((diff % 3600000) / 60000).toString().padStart(2, '0');
      let s = Math.floor((diff % 60000) / 1000).toString().padStart(2, '0');
      document.getElementById('timer').innerText = `${h}:${m}:${s}`;
    }

    setInterval(fetchData, 5000); 
    setInterval(updateTimer, 1000);
    fetchData();
    updateTimer();
    smoothCounter();
  </script>
</body>
</html>
